<button
  type="button"
  class="modal-close-btn"
  mat-dialog-close
  data-test-id="btnCloseChatBox"
>
  <img src="assets/svgs/modal-close-icon.svg" alt="" width="100%" />
</button>

<div class="chat-main-con" data-test-id="chatBox">
  <div class="chat-con-title">
    <div class="chat-item-info" data-test-id="chatBoxPatientInfo">
      <img
        src="{{ checkPatientRegField('Profile Photo') ? baseUrl + '/personimage/' + data.patientPersonUuid : ''}}"
        alt=""
        data-test-id="imgChatBoxPatientPhoto"
      />
      <div class="title">
        <h6 class="mb-0" data-test-id="lblChatBoxPatientName">
          {{ this.data.patientName }}
        </h6>
        <span data-test-id="lblChatBoxPatientId">
          {{ data.patientOpenMrsId }}
        </span>
      </div>
    </div>
  </div>

  <div class="chat-con-body">
    <ul class="chat-messages-list" data-test-id="chatMessageList">
      <ng-container
        *ngFor="let item of messageList; index as i; let first = first"
      >
        <li
          class="chat-status"
          [class.right]="item?.fromUser === chatSvc?.user?.uuid"
          data-test-id="chatMessageStatus-{{i}}"
        >
          <span class="mr-1" data-test-id="chatMessageTime-{{i}}">
            {{ item.createdAt | amDateFormat : "LT" }}
          </span>

          <ng-container *ngIf="first && item?.fromUser === chatSvc?.user?.uuid">
            <ng-container *ngIf="sending; else sent">
              <img src="assets/svgs/sending.svg" alt="" />
              <span class="ml-1" data-test-id="chatStatusSending">Sending</span>
            </ng-container>
            <ng-template #sent>
              <ng-container *ngIf="item.isRead; else delivered">
                <img src="assets/svgs/read-status.svg" alt="" />
                <span class="ml-1" data-test-id="chatStatusRead">Read</span>
              </ng-container>
              <ng-template #delivered>
                <ng-container *ngIf="item.isDelivered; else third">
                  <img src="assets/svgs/delivered_double_tick.svg" alt="" />
                  <span class="ml-1" data-test-id="chatStatusDelivered">Delivered</span>
                </ng-container>
              </ng-template>
              <ng-template #third>
                <img src="assets/svgs/sent-status.svg" alt="" />
                <span class="ml-1" data-test-id="chatStatusSent">Sent</span>
              </ng-template>
            </ng-template>
          </ng-container>
        </li>

        <li
          class="chat-message"
          [class.right]="item?.fromUser === chatSvc?.user?.uuid"
          data-test-id="chatMessage-{{i}}"
        >
          <ng-container *ngIf="item.type === 'attachment'; else message">
            <img
              class="attachment"
              alt=""
              [src]="isPdf(item.message) ? pdfDefaultImage : defaultImage"
              (click)="setImage(item.message)"
              data-test-id="chatAttachment-{{i}}"
            />
          </ng-container>
          <ng-template #message>
            <span data-test-id="chatMessageText-{{i}}">
              {{ item.message }}
            </span>
          </ng-template>
        </li>
      </ng-container>
    </ul>

    <div class="chat-input-con mb-2 position-relative">
      <div
        [class.red]="msgCharCount > CHAT_TEXT_LIMIT"
        class="char-count grey position-absolute"
        data-test-id="lblChatCharCount"
      >
        {{ msgCharCount }}/1000
      </div>

      <div class="input-group mr-2">
        <input
          type="text"
          class="form-control"
          placeholder="Type here"
          [(ngModel)]="message"
          (keyup.enter)="sendMessage()"
          data-test-id="etChatMessageChatBox"
        />
      </div>

      <button
        type="button"
        class="send-btn"
        (click)="sendMessage()"
        [disabled]="msgCharCount > CHAT_TEXT_LIMIT"
        [class.bg-grey]="msgCharCount > CHAT_TEXT_LIMIT"
        data-test-id="btnSendMessageChatBox"
      >
        <img src="assets/svgs/send-icon-white.svg" alt="" />
      </button>
    </div>
  </div>
</div>
