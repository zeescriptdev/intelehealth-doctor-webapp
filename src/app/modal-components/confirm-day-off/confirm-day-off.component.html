<div class="intel-con-modal" data-test-id="dayOffModal">
  <div class="close-btn-con">
    <button
      class="modal-close-btn"
      (click)="close(false)"
      data-test-id="btnCloseDayOffModal"
    >
      <img src="assets/svgs/CloseX.svg" alt="" />
    </button>
  </div>

  <div class="modal-con mt-4">
    <img
      src="assets/svgs/warning-circle.svg"
      alt=""
      width="80px"
      height="80px"
      data-test-id="imgWarningDayOffModal"
    />
    <h6 class="mt-3" data-test-id="lblDayOffTitle">
      {{ 'Mark as day off' | translate }}
    </h6>
    <p class="mt-2 text-center" data-test-id="lblDayOffMessage">
      {{ 'Are you sure you want to mark' | translate }}
      <b data-test-id="lblDayOffDate">{{ data | date: 'dd MMMM, yyyy' }}</b>
      {{ 'as day off? All the appointments will be canceled for the day.'
        | translate }}
    </p>
  </div>

  <div class="modal-action-btn-con">
    <button
      class="modal-btn white-btn mr-3"
      type="button"
      (click)="close(false)"
      data-test-id="btnCancelDayOffModal"
    >
      {{ 'Go back' | translate }}
    </button>
    <button
      class="modal-btn blue-btn"
      type="button"
      (click)="close(true)"
      data-test-id="btnConfirmDayOffModal"
    >
      {{ 'Confirm' | translate }}
    </button>
  </div>
</div>
