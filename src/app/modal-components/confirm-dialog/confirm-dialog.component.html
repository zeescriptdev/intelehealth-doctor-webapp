<div class="intel-con-modal" data-test-id="confirmationModal">
  <div class="close-btn-con">
    <button
      class="modal-close-btn"
      (click)="close(false)"
      data-test-id="btnCloseConfirmationModal"
    >
      <img src="assets/svgs/CloseX.svg" alt="" />
    </button>
  </div>

  <div class="modal-con mt-4">
    <img
      src="assets/svgs/warning-circle.svg"
      alt="warning"
      width="80px"
      height="80px"
      data-test-id="imgWarningConfirmationModal"
    />
    <h6 class="mt-3" data-test-id="lblConfirmationTitle">
      {{ 'Confirm' | translate }}
    </h6>
    <p class="mt-2 text-center" data-test-id="lblConfirmationMessage">
      {{ data.confirmationMsg | translate }}
    </p>
  </div>

  <div class="modal-action-btn-con">
    <button
      class="modal-btn white-btn mr-3"
      type="button"
      (click)="close(false)"
      data-test-id="btnCancelConfirmationModal"
    >
      {{ data.cancelBtnText | translate }}
    </button>
    <button
      class="modal-btn blue-btn"
      type="button"
      (click)="close(true)"
      data-test-id="btnSubmitConfirmationModal"
    >
      {{ data.confirmBtnText | translate }}
    </button>
  </div>
</div>
