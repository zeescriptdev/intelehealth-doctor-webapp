<div class="intel-con-modal" data-test-id="confirmOpenMRSIdModal">
  <div class="modal-con mt-4">
    <img
      src="assets/svgs/warning-circle.svg"
      alt="warning"
      width="80px"
      height="80px"
      data-test-id="imgWarningConfirmOpenMRSIdModal"
    />
    <h6 class="mt-3" data-test-id="lblConfirmOpenMRSIdTitle">
      {{ 'OpenMRS ID' | translate }}
    </h6>
    <p class="mt-2 text-center" data-test-id="lblConfirmOpenMRSIdMessage">
      {{ 'Please enter the OpenMRS ID to view prescription.' | translate }}
    </p>
    <div class="form-group">
      <input
        type="text"
        class="form-control"
        [(ngModel)]="openMrsId"
        placeholder="{{ 'Enter OpenMRS ID' | translate }}"
        data-test-id="etConfirmOpenMRSId"
      />
    </div>
  </div>

  <div class="modal-action-btn-con">
    <button
      class="modal-btn blue-btn"
      type="button"
      (click)="submit()"
      data-test-id="btnSubmitConfirmOpenMRSId"
    >
      {{ 'Submit' | translate }}
    </button>
  </div>
</div>
