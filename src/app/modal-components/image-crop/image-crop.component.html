<div class="image-crop-modal" data-test-id="imageCropModal">
  <div class="close-btn-con">
    <button
      class="modal-close-btn"
      (click)="closeDialog()"
      data-test-id="btnCloseImageCropModal"
    >
      <img src="assets/svgs/CloseX.svg" alt="close" />
    </button>
  </div>

  <div class="modal-con mt-4" data-test-id="imageCropContent">
    <image-cropper
      [imageBase64]="imageBase64"
      [maintainAspectRatio]="true"
      [aspectRatio]="4 / 4"
      format="jpeg"
      output="base64"
      [roundCropper]="true"
      (imageCropped)="imageCropped($event)"
      (loadImageFailed)="loadImageFailed()"
      [resizeToWidth]="256"
      data-test-id="imageCropper"
    ></image-cropper>

    <h6
      class="mt-3"
      *ngIf="isError"
      data-test-id="errorImageCrop"
    >
      {{ 'Error in selected Image' | translate }}
    </h6>
  </div>

  <div class="modal-action-btn-con" data-test-id="imageCropActions">
    <button
      class="modal-btn blue-btn"
      type="button"
      (click)="cropImage()"
      data-test-id="btnSaveImageCrop"
    >
      {{ 'Save' | translate }}
    </button>
  </div>
</div>
