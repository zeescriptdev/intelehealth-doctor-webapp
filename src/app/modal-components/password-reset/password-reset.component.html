<div class="intel-con-modal">
  <div class="close-btn-con">
    <button class="modal-close-btn" (click)="close(false)" data-test-id="btnClose">
      <img src="assets/svgs/CloseX.svg" alt="">
    </button>
  </div>
  <div class="modal-con mt-5">
    <form [formGroup]="passwordResetForm" (ngSubmit)="resetPassword()">
      <div class="form-row">
        <div class="form-group col-md-12">
          <label for="newPassword">{{'New Password' | translate}} *</label>
          <input type="password" maxlength="20" minlength="8" class="form-control"
                 formControlName="newPassword"
                 placeholder="{{'Enter New Password' | translate}}"
                 data-test-id="etNewPassword">
          <div class="check">
            <img class="h-75" src="assets/svgs/icon-lock.svg">
          </div>
          <app-password-strength-meter [showDetails]="f1.newPassword.dirty && submitted && f1.newPassword.errors?.pattern" 
                                      [password]="f1.newPassword.value"
                                      data-test-id="passwordStrengthMeter">
          </app-password-strength-meter>
          <div *ngIf="submitted && f1.newPassword.errors" class="d-flex flex-column">
            <small class="error-msg" *ngIf="f1.newPassword.errors.required" data-test-id="errorNewPasswordRequired">
              {{'Enter New Password' | translate}}
            </small>
            <small class="error-msg" *ngIf="f1.newPassword.errors.minlength" data-test-id="errorNewPasswordMinLength">
              {{'Minimum 8 charactors required' | translate}}
            </small>
            <small class="error-msg" *ngIf="f1.newPassword.errors.maxlength" data-test-id="errorNewPasswordMaxLength">
              {{'Maximum 20 charactors allowed' | translate}}
            </small>
          </div>
        </div>

        <div class="form-group col-md-12">
          <label for="confirmNewPassword">{{'Confirm Password' | translate}} *</label>
          <input type="password" class="form-control" formControlName="confirmNewPassword"
                 placeholder="{{'Enter Confirm Password' | translate}}" 
                 data-test-id="etConfirmPassword">
          <div class="check">
            <img class="h-75" src="assets/svgs/icon-lock.svg">
          </div>
          <div *ngIf="submitted && f1.confirmNewPassword.errors">
            <small class="error-msg" *ngIf="f1.confirmNewPassword.errors.required" data-test-id="errorConfirmPasswordRequired">
              {{'Enter Confirm Password' | translate}}
            </small>
          </div>
          <div *ngIf="submitted && !f1.confirmNewPassword.errors">
            <small class="error-msg" *ngIf="passwordResetForm.get('newPassword').value !== passwordResetForm.get('confirmNewPassword').value" 
                   data-test-id="errorPasswordMismatch">
              {{'Password and Confirm Password must match' | translate}}
            </small>
          </div>
        </div>
      </div>

      <div class="form-row mt-3">
        <div class="form-group col-md-12 text-center">
          <button type="submit" class="btn next-btn" data-test-id="btnResetPassword">
            {{'Reset Password'| translate}}
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
