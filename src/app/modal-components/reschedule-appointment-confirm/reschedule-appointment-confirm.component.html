<div class="intel-con-modal" data-test-id="rescheduleConfirmModal">
  <div class="close-btn-con">
    <button
      class="modal-close-btn"
      (click)="close(false)"
      data-test-id="btnCloseRescheduleConfirm"
    >
      <img src="assets/svgs/CloseX.svg" alt="close" />
    </button>
  </div>

  <div class="modal-con mt-4" data-test-id="rescheduleConfirmModalBody">
    <img src="assets/svgs/appointment.svg" alt="appointment" width="80px" height="80px" />
    <h6 class="mt-3">{{ 'Reschedule the appointment' | translate }}</h6>
    <p class="mt-2 text-center">
      {{ 'Are you sure you want to reschedule appointment?' | translate }}
    </p>

    <!-- Slot Comparison -->
    <div class="slot-con d-flex justify-content-center align-items-center py-3" data-test-id="slotCompare">
      <!-- Old Slot -->
      <div class="d-flex flex-column align-items-center justify-content-center px-2" data-test-id="oldSlot">
        <b data-test-id="oldSlotDate">{{ data?.appointment?.slotJsDate | date:'dd MMMM' }}</b>
        <b data-test-id="oldSlotTime">{{ data?.appointment?.slotTime }}</b>
      </div>

      <div class="d-flex flex-column align-items-center justify-content-center px-2">
        <span class="text-muted">to</span>
      </div>

      <!-- New Slot -->
      <div class="d-flex flex-column align-items-center justify-content-center px-2" data-test-id="newSlot">
        <b data-test-id="newSlotDate">{{ data?.newSlot?.date | date:'dd MMMM' }}</b>
        <b data-test-id="newSlotTime">{{ data?.newSlot?.slot }}</b>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="modal-action-btn-con" data-test-id="rescheduleConfirmModalActions">
    <button
      class="modal-btn white-btn mr-3"
      type="button"
      (click)="close(false)"
      data-test-id="btnCancelRescheduleConfirm"
    >
      {{ 'Go Back' | translate }}
    </button>
    <button
      class="modal-btn blue-btn"
      type="button"
      (click)="close(true)"
      data-test-id="btnSubmitRescheduleConfirm"
    >
      {{ 'Confirm' | translate }}
    </button>
  </div>
</div>
