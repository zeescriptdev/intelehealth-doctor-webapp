<div class="select-lang-modal" data-test-id="selectLanguageModal">
  <!-- Modal Title -->
  <div class="modal-title-con" data-test-id="selectLanguageModalTitle">
    <h6 class="mb-0">{{ 'Select Language' | translate }}</h6>
    <div class="close-btn-con">
      <button
        class="modal-close-btn"
        (click)="close(false)"
        data-test-id="btnCloseSelectLanguageModal"
      >
        <img src="assets/svgs/CloseX.svg" alt="">
      </button>
    </div>
  </div>

  <!-- Modal Content -->
  <div class="modal-con" data-test-id="selectLanguageModalBody">
    <div class="container-fluid">
      <div class="row">
        <form
          [formGroup]="languageForm"
          (ngSubmit)="select()"
          class="col-md-12 p-0"
          data-test-id="selectLanguageForm"
        >
          <div class="row">
            <!-- English -->
            <div class="col-6 p-1" data-test-id="languageOptionEnglish">
              <div class="lang-item">
                <div class="pretty p-default p-round">
                  <input
                    type="radio"
                    value="en"
                    formControlName="language"
                    data-test-id="radioEnglish"
                  />
                  <div class="state p-success-o">
                    <label data-test-id="labelEnglish">English</label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Russian -->
            <div class="col-6 p-1" data-test-id="languageOptionRussian">
              <div class="lang-item">
                <div class="pretty p-default p-round">
                  <input
                    type="radio"
                    value="ru"
                    formControlName="language"
                    data-test-id="radioRussian"
                  />
                  <div class="state p-success-o">
                    <label data-test-id="labelRussian">Russian</label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Submit -->
            <div class="col-12 text-center py-2">
              <button
                class="modal-btn blue-btn"
                type="submit"
                data-test-id="btnSubmitSelectLanguageModal"
              >
                {{ 'Select' | translate }}
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
