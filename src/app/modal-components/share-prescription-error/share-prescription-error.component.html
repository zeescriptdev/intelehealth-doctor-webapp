<div class="intel-con-modal" data-test-id="cannotSharePrescriptionModal">
  <!-- Close Button -->
  <div class="close-btn-con">
    <button
      class="modal-close-btn"
      (click)="close(false)"
      data-test-id="btnCloseCannotSharePrescriptionModal"
    >
      <img src="assets/svgs/CloseX.svg" alt="">
    </button>
  </div>

  <!-- Modal Content -->
  <div class="modal-con mt-4" data-test-id="cannotSharePrescriptionModalBody">
    <img src="assets/svgs/warning-circle.svg" alt="" width="80px" height="80px">
    <h6 class="mt-3" data-test-id="cannotSharePrescriptionModalTitle">
      {{ 'Cannot share prescription' | translate }}
    </h6>
    <p class="mt-2 text-center" data-test-id="cannotSharePrescriptionModalMessage">
      {{ (data.msg) | translate }}
    </p>
  </div>

  <!-- Action Buttons -->
  <div class="modal-action-btn-con" data-test-id="cannotSharePrescriptionModalActions">
    <button
      class="modal-btn white-btn mr-3"
      type="button"
      (click)="close(false)"
      data-test-id="btnCancelCannotSharePrescriptionModal"
    >
      {{ 'Go back' | translate }}
    </button>
    <button
      class="modal-btn blue-btn"
      type="button"
      (click)="close(true)"
      data-test-id="btnSubmitCannotSharePrescriptionModal"
    >
      {{ (data.confirmBtnText) | translate }}
    </button>
  </div>
</div>
