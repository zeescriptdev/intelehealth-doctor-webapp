<div class="intel-con-modal" data-test-id="sharePrescriptionModal">
  <!-- Close Button -->
  <div class="close-btn-con">
    <button
      class="modal-close-btn"
      (click)="close(false)"
      data-test-id="btnCloseSharePrescriptionModal"
    >
      <img src="assets/svgs/CloseX.svg" alt="">
    </button>
  </div>

  <!-- Modal Content -->
  <div class="modal-con mt-4" data-test-id="sharePrescriptionModalBody">
    <img src="assets/svgs/prescription.svg" alt="" width="80px" height="80px">
    <h6 class="mt-3" data-test-id="sharePrescriptionModalTitle">
      {{ 'Share prescription' | translate }}
    </h6>
    <p class="mt-2 text-center" data-test-id="sharePrescriptionModalMessage">
      {{ 'Are you sure you want to share this prescription?' | translate }}
    </p>
  </div>

  <!-- Action Buttons -->
  <div class="modal-action-btn-con" data-test-id="sharePrescriptionModalActions">
    <button
      class="modal-btn white-btn mr-3"
      type="button"
      (click)="close(false)"
      data-test-id="btnCancelSharePrescriptionModal"
    >
      {{ 'Go back' | translate }}
    </button>
    <button
      class="modal-btn blue-btn"
      type="button"
      (click)="close(true)"
      data-test-id="btnSubmitSharePrescriptionModal"
    >
      {{ 'Confirm' | translate }}
    </button>
  </div>
</div>
