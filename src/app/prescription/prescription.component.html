<div class="container-fluid" data-test-id="prescriptionContainer">
  <div class="row" data-test-id="prescriptionRow">
    <div class="col-md-12 p-0" data-test-id="prescriptionCol">
      <ul
        ngbNav
        #nav="ngbNav"
        [(activeId)]="active"
        class="nav-tabs nav-pills"
        data-test-id="prescriptionTabs"
      >
        <li [ngbNavItem]="1" data-test-id="tabPrescriptionSent">
          <a ngbNavLink data-test-id="navSent">
            <div class="chip-item chip-item-blue" data-test-id="chipSent">
              <img class="chip-img" src="assets/svgs/pad.svg" alt="" data-test-id="chipSentIcon" />
              <div class="chip-info" data-test-id="chipSentInfo">
                <h6 data-test-id="chipSentCount">{{ prescriptionSentCount }}</h6>
                <span data-test-id="chipSentLabel">{{ 'Prescription Sent' | translate }}</span>
              </div>
            </div>
          </a>
          <ng-template ngbNavContent>
            <ng-container *ngIf="loaded2" data-test-id="sentContentContainer">
              <app-sent
                [prescriptionsSent]="prescriptionSent"
                [prescriptionsSentCount]="prescriptionSentCount"
                (fetchPageEvent)="getPrescriptionSentVisitsData($event)"
                data-test-id="appSentComponent"
              ></app-sent>
            </ng-container>
          </ng-template>
        </li>

        <li [ngbNavItem]="2" data-test-id="tabCompletedVisits">
          <a ngbNavLink data-test-id="navCompleted">
            <div class="chip-item chip-item-green" data-test-id="chipCompleted">
              <img class="chip-img" src="assets/svgs/completed-2.svg" alt="" data-test-id="chipCompletedIcon" />
              <div class="chip-info" data-test-id="chipCompletedInfo">
                <h6 data-test-id="chipCompletedCount">{{ completedVisitsCount }}</h6>
                <span data-test-id="chipCompletedLabel">{{ 'Completed Visits' | translate }}</span>
              </div>
            </div>
          </a>
          <ng-template ngbNavContent>
            <ng-container *ngIf="loaded1" data-test-id="completedContentContainer">
              <app-completed
                [completedVisits]="completedVisits"
                [completedVisitsCount]="completedVisitsCount"
                (fetchPageEvent)="getCompletedVisitsData($event)"
                data-test-id="appCompletedComponent"
              ></app-completed>
            </ng-container>
          </ng-template>
        </li>
      </ul>

      <div [ngbNavOutlet]="nav" class="mt-2" data-test-id="navOutlet"></div>
    </div>
  </div>
</div>
