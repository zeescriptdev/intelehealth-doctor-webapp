<div class="container" data-test-id="containerForgotPassword">
  <div class="row" data-test-id="rowForgotPassword">
    <div class="col-md-12 p-0 section-title" data-test-id="sectionTitle">
      <h6 data-test-id="lblForgotPassword">{{'Forgot Password'|translate}}</h6>
      <p data-test-id="lblInstruction">
        {{'No worries, enter your username and we will send you the OTP to reset your password.'|translate}}
      </p>
    </div>

    <div class="col-md-12 px-0 py-4" data-test-id="contentWrapper">
      <form [formGroup]="forgotPasswordForm"
            (ngSubmit)="forgotPassword()"
            data-test-id="formForgotPassword">
        <div class="form-group" data-test-id="groupUsername">
          <label for="username" data-test-id="lblUsername">
            {{'Username'|translate}}
            <span class="link" data-test-id="linkWrapperForgotUsername">
              <a routerLink="/session/forgot-username"
                 data-test-id="linkForgotUsername">
                 {{'Forgot Username'|translate}} ?
              </a>
            </span>
          </label>
          <input type="text"
                 class="form-control"
                 formControlName="username"
                 placeholder="{{'Enter username'|translate}}"
                 data-test-id="etUsername">
          <div *ngIf="submitted && f.username.errors"
               data-test-id="msgUsernameErrors">
            <small *ngIf="f.username.errors.required"
                   class="error-msg"
                   data-test-id="msgUsernameRequired">
              {{'Please enter username'|translate}}
            </small>
            <small *ngIf="f.username.errors.usernameExists"
                   class="error-msg"
                   data-test-id="msgUsernameInvalid">
              {{'Please enter valid username'|translate}}
            </small>
          </div>
        </div>

        <div class="form-group mt-5" data-test-id="groupSubmit">
          <button type="submit"
                  class="btn btn-block next-btn"
                  data-test-id="btnSubmitForgotPassword">
            {{'Next'|translate}}
            <img class="btn-icon"
                 src="assets/svgs/right-arrow.svg"
                 alt=""
                 data-test-id="iconRightArrow">
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
